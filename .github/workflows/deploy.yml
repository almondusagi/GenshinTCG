name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: 依存パッケージをインストール
        run: npm ci

      - name: ビルド
        run: npm run build

      - name: GitHub Pages の設定
        uses: actions/configure-pages@v4
        with:
          enablement: true   # ← これが必須: Pagesを自動で有効化する

      - name: dist フォルダをアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: GitHub Pages へデプロイ
        id: deployment
        uses: actions/deploy-pages@v4